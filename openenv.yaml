name: grev-openenv
version: "1.0.0"
description: >
  OpenEnv environment where AI agents are dropped into broken Python
  repositories and must use shell commands and file edits to fix them
  until the full pytest suite passes. Simulates the real-world CI/CD
  debugging task that software engineers perform daily.
tags:
  - openenv
  - devops
  - ci-cd
  - python
  - debugging
  - pytest
  - code-review
author: "LangerSword"
license: MIT

tasks:
  - id: easy
    description: "Fix a syntax error in a broken Python repository."
    difficulty: easy
    max_steps: 8
    reward_range: [0.0, 1.0]
    baseline_score: 0.85

  - id: medium
    description: "Fix a logic error — wrong return value or off-by-one — traced from failing pytest assertions."
    difficulty: medium
    max_steps: 8
    reward_range: [0.0, 1.0]
    baseline_score: 0.60

  - id: hard
    description: "Fix a multi-file import/dependency mismatch where the failure traceback points to the wrong file."
    difficulty: hard
    max_steps: 8
    reward_range: [0.0, 1.0]
    baseline_score: 0.35

observation_space:
  type: object
  description: "Workspace state after each action — file listing, command output, step counter."
  fields:
    task_id: "Active task identifier"
    current_directory: "Absolute path to the agent workspace"
    directory_contents: "List of files in the workspace"
    last_command_stdout: "Stdout from previous run_command"
    last_command_stderr: "Stderr from previous run_command"
    step: "Current step number"
    max_steps: "Episode step limit"
    done: "True when all tests pass or max steps reached"
    info: "Human-readable hint"

action_space:
  type: object
  description: "Two action types — run a shell command or overwrite a file."
  actions:
    - run_command: "Execute a shell command in the workspace (e.g. pytest, cat, grep). Timeout: 15s."
    - edit_file: "Overwrite a file with corrected content."

endpoints:
  health: GET /health
  tasks: GET /tasks
  reset: POST /reset
  step: POST /step
  state: GET /state
  grade: POST /grade

entry_point: grev.env:gREVEnv
models:
  observation: grev.models:Observation
  action: grev.models:Action
  reward: grev.models:Reward
